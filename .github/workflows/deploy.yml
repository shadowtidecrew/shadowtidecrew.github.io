name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

  # Allows manual trigger from the Actions tab
  workflow_dispatch:

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject Discord webhook URL from secret
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        shell: bash
        run: |
          node << 'SCRIPT'
          const fs = require('fs');
          const url = process.env.DISCORD_WEBHOOK_URL;
          if (url) {
            const cfg = JSON.parse(fs.readFileSync('src/data/config.json', 'utf8'));
            cfg.discord.webhookUrl = url;
            fs.writeFileSync('src/data/config.json', JSON.stringify(cfg, null, 2));
            console.log('✓ Injected webhook URL into config.json');
          } else {
            console.log('No DISCORD_WEBHOOK_URL secret set — using placeholder from config.json.example');
          }
          SCRIPT

      - name: Build
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
